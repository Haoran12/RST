# Windows MSVC linker configuration
# Only applies to Windows target, does not affect Android builds
[target.x86_64-pc-windows-msvc]
linker = "D:\\Programs\\Visual Studio\\VC\\Tools\\MSVC\\14.50.35717\\bin\\Hostx64\\x64\\link.exe"

# Android targets use NDK toolchain, no custom config needed
# aarch64-linux-android - for arm64-v8a
# armv7-linux-androideabi - for armeabi-v7a
# i686-linux-android - for x86
# x86_64-linux-android - for x86_64
